<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenLeaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <linearGradient id="printerBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- Paper Top -->
  <path d="M 60 40 h 80 v 60 h -80 z" fill="#e2e8f0" />
  <line x1="75" y1="60" x2="125" y2="60" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" />
  <line x1="75" y1="80" x2="110" y2="80" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" />

  <!-- Printer Base -->
  <path d="M 30 100 h 140 v 40 a 20 20 0 0 1 -20 20 h -100 a 20 20 0 0 1 -20 -20 z" fill="url(#printerBody)" />
  <path d="M 20 110 h 160 v 15 a 10 10 0 0 1 -10 10 h -140 a 10 10 0 0 1 -10 -10 z" fill="#475569" />

  <!-- Paper Output -->
  <path d="M 50 140 h 100 v 40 a 5 5 0 0 1 -5 5 h -90 a 5 5 0 0 1 -5 -5 z" fill="#ffffff" />
  <line x1="70" y1="160" x2="130" y2="160" stroke="#4ade80" stroke-width="6" stroke-linecap="round" />
  <line x1="70" y1="175" x2="110" y2="175" stroke="#4ade80" stroke-width="6" stroke-linecap="round" />

  <!-- Green Leaf Element overlapping -->
  <path d="M 120 140 C 160 110, 190 140, 170 180 C 140 160, 110 150, 120 140 Z" fill="url(#greenLeaf)" opacity="0.9" />
</svg>
